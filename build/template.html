<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7KGFGQLBRJ"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-7KGFGQLBRJ');
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico">
<link rel="canonical" href="{{CANONICAL}}">
{{HREFLANG}}
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="author" content="David González Diez">

<!-- Open Graph data -->
<meta property="og:title" content="{{OG_TITLE}}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{CANONICAL}}" />
<meta property="og:description" content="{{DESCRIPTION}}" />
<meta property="og:site_name" content="{{SITE_NAME}}" />
<meta property="og:image" content="https://hectareometro.com/images/logo.png" />
<meta property="og:locale" content="{{OG_LOCALE}}" />

<!-- Structured data (schema.org) -->
<script type="application/ld+json">
{{JSON_LD}}
</script>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1fgjWPGmkzs7" crossorigin="anonymous">
<link href='https://fonts.googleapis.com/css?family=Open+Sans' rel='stylesheet' type='text/css'>
<link href='/css/style.css' rel='stylesheet' type='text/css'>
<script>var PAGE_LANG = '{{PAGE_LANG}}'; var PRESET_HECTAREAS = {{HA}};{{PRESET_EXTRA}}</script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js" integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS" crossorigin="anonymous"></script>
<script type="text/javascript" src="/js/hectareas-utils.js"></script>
<script type="text/javascript" src="/js/hectareas.js"></script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCKseKyzd2GsrgBOT5D1dLbKWVLMUnN2LE&loading=async&callback=initMap"></script>
<link rel="stylesheet" type="text/css" href="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.0.3/cookieconsent.min.css" />
<script src="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.0.3/cookieconsent.min.js"></script>
<script>
window.addEventListener("load", function(){
window.cookieconsent.initialise({
  "palette": { "popup": { "background": "#000" }, "button": { "background": "#337AB7" } },
  "theme": "classic",
  "position": "bottom-right"
})});
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4477095176837087" crossorigin="anonymous"></script>
</head>
<body>
<nav class="navbar navbar-default site-nav">
  <div class="container-fluid">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#site-nav-collapse" aria-expanded="false">
        <span class="sr-only">{{NAV_MENU_LABEL}}</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="{{HOME_URL}}">{{SITE_NAME}}</a>
    </div>
    <div class="collapse navbar-collapse" id="site-nav-collapse">
      <ul class="nav navbar-nav">
        <li><a href="{{NAV_DIST_URL}}">{{NAV_DIST_LABEL}}</a></li>
      </ul>
      <ul class="nav navbar-nav navbar-right">
        <li>{{LANG_SWITCH}}</li>
      </ul>
    </div>
  </div>
</nav>
<div id="map-container">
  <div id="map"></div>
  <div id="hectareas-overlay">
    <label for="hectareas">{{OVERLAY_PRE}}</label>
    <input type="text" id="hectareas" class="customizable-parameter">
    <label for="hectareas">{{OVERLAY_POST}}</label>
    <div id="equivalences" aria-live="polite"></div>
  </div>
</div>

<div class="container-fluid">
  <div id="share-block" class="text-center">
        <p id="share-cta">{{SHARE_CTA}}</p>
        <div id="share-social">
          <a id="whatsapp-share" class="fa fa-whatsapp fa-2x share-link" href="" target="_blank" rel="noopener" aria-label="WhatsApp"></a>
          <a id="twitter-share" class="fa fa-twitter-square fa-2x share-link" href="" target="_blank" rel="noopener" aria-label="X/Twitter"></a>
          <a id="facebook-share" class="fa fa-facebook-official fa-2x share-link" href="" target="_blank" rel="noopener" aria-label="Facebook"></a>
        </div>
        <div id="share-details">
          <a href="#share-advanced" data-toggle="collapse" class="share-toggle">
            <i class="fa fa-caret-down"></i> {{SHARE_MORE}}
          </a>
          <div id="share-advanced" class="collapse">
            <form>
              <div class="form-group">
                <label class="control-label" for="url-share">{{LABEL_LINK}}</label>
                <input type="text" id="url-share" class="share-link form-control" readonly />
              </div>
              <div class="form-group">
                <label class="control-label" for="iframe-share">{{LABEL_IFRAME}}</label>
                <textarea id="iframe-share" class="form-control" rows="3" readonly ></textarea>
              </div>
              <div class="row">
                <div class="col-xs-6">
                  <label class="control-label" for="iframe-share-width">{{LABEL_WIDTH}}</label>
                  <input type="text" id="iframe-share-width" class="form-control customizable-parameter">
                </div>
                <div class="col-xs-6">
                  <label class="control-label" for="iframe-share-height">{{LABEL_HEIGHT}}</label>
                  <input type="text" id="iframe-share-height" class="form-control customizable-parameter">
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
  <div class="row">
    <div class="col-xs-12 col-md-8 col-md-offset-2 content-section">
      <h1>{{H1}}</h1>
      {{INTRO}}

      <h2>{{RELATED_HEADING}}</h2>
      <ul class="related-links">
        {{RELATED_LINKS}}
      </ul>
      <p><a href="{{HOME_URL}}">{{BACK_TEXT}}</a></p>
    </div>
  </div>
</div>
<footer class="site-footer text-center">
  <ul class="footer-links">
    <li><a href="{{HOME_URL}}">{{SITE_NAME}}</a></li>
    <li><a href="{{NAV_DIST_URL}}">{{NAV_DIST_LABEL}}</a></li>
  </ul>
  <p>by <a href="https://twitter.com/penguinjournals">@penguinjournals</a> and <a href="https://twitter.com/buzzkomarketing">@BuzzkoMarketing</a></p>
</footer>
</body>
</html>
